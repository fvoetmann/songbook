t;localized_text&quot;:&quot;&quot;},{&quot;id&quot;:2838050,&quot;rowid&quot;:335727,&quot;text&quot;:&quot;No capo needed. Listen to the song, its in the right key. If you wanted to sing it higher that the recording, slap a capo wherever you want.&quot;,&quot;author_userid&quot;:224975,&quot;rating&quot;:14,&quot;userid&quot;:970884,&quot;usergroupid&quot;:2,&quot;username&quot;:&quot;cwelder&quot;,&quot;date_created&quot;:1226967274,&quot;type&quot;:4,&quot;parent_id&quot;:0,&quot;added_from&quot;:&quot;&quot;,&quot;updated_at&quot;:null,&quot;status&quot;:&quot;new&quot;,&quot;moderator_user_id&quot;:11953509,&quot;likes_count&quot;:16,&quot;dislikes_count&quot;:2,&quot;contributor_level&quot;:null,&quot;avatar&quot;:&quot;https://tabs.ultimate-guitar.com/static/users/4/8/8/970884.gif?d=d&quot;,&quot;date&quot;:1226967274,&quot;user_iq&quot;:10,&quot;localized_text&quot;:&quot;&quot;},{&quot;id&quot;:4594950,&quot;rowid&quot;:335727,&quot;text&quot;:&quot;Great tab! Although RangerDan88 is right though about the chords after the \&quot;you know I believe in how\&quot; part. It doesn&#039;t sound right just playing the D6 with the riff.\r\n\r\nAnd to answer bonjgday and digoutyerarse...\r\n\r\nAmM7 is played (x02110)\r\n\r\nA/E, as far as I know, is (002220). An &#039;A&#039; chord with an E on the bass.\r\n\r\nThere are minor-major chords because the chord is a minor, but the major-7th note (in this case Ab/G#) is being played instead of a minor-7th (G). If the chord were Am7 it would be (x02010), but the major-7th makes it (x02110). Likewise, If it were just AM7 it would be (x02120), and the chord would be major instead of minor, which would not match the song.\r\n\r\nAs far as I know, it doesn&#039;t work the other way around though. Take A7, for example (x02020). It&#039;s actually the major chord with a minor-7th, which would be AMm7 when written, but it doesn&#039;t make sense to write it like that for two reasons. 1) We don&#039;t need to specify when a chord is major with an upper-case \&quot;M\&quot;, we simply just write the letter; and 2) If we specified you were playing a minor-7th chord and left it as Am7, then we&#039;d think it was (x02010). So we avoid all that by making Mm7th chords as regular 7th&#039;s.\r\n\r\nFor reference:\r\n\r\nA     (x02220)\r\nA7    (x02020)\r\nAM7   (x02120)\r\nAm    (x02210)\r\nAm7   (x02010)\r\nAmM7  (x02110)&quot;,&quot;author_userid&quot;:224975,&quot;rating&quot;:10,&quot;userid&quot;:423965,&quot;usergroupid&quot;:21,&quot;username&quot;:&quot;Machavelli57&quot;,&quot;date_created&quot;:1313065911,&quot;type&quot;:4,&quot;parent_id&quot;:0,&quot;added_from&quot;:&quot;&quot;,&quot;updated_at&quot;:null,&quot;status&quot;:&quot;new&quot;,&quot;moderator_user_id&quot;:11953509,&quot;likes_count&quot;:11,&quot;dislikes_count&quot;:1,&quot;contributor_level&quot;:3,&quot;avatar&quot;:&quot;https://tabs.ultimate-guitar.com/static/users/5/6/9/423965.gif?d=d&quot;,&quot;date&quot;:1313065911,&quot;user_iq&quot;:343,&quot;localized_text&quot;:&quot;&quot;}],&quot;comments&quot;:83,&quot;stats&quot;:{&quot;view_total&quot;:4499568,&quot;favorites_count&quot;:111453},&quot;chord_type&quot;:&quot;guitar&quot;,&quot;tab_corrects&quot;:[],&quot;is_simplify_available&quot;:true,&quot;isSimplified&quot;:null,&quot;simplifiedUrl&quot;:null,&quot;can_edit_tab&quot;:false,&quot;can_edit_strumming&quot;:false,&quot;can_send_tab_stats&quot;:true,&quot;official_backingtrack&quot;:null,&quot;tab_search_link&quot;:&quot;https://www.ultimate-guitar.com/search.php?band_name=The+Beatles&amp;song_name=something&amp;type%5B0%5D=200&amp;type%5B1%5D=300&quot;,&quot;wiki_tab_user_group_id&quot;:25,&quot;wiki_tab_user_iq&quot;:273044,&quot;user_group_id&quot;:21,&quot;count_rating&quot;:6239,&quot;encode_strummings&quot;:&quot;{\&quot;patterns\&quot;:[{\&quot;part\&quot;:\&quot;Main Pattern\&quot;,\&quot;denuminator\&quot;:16,\&quot;bpm\&quot;:66,\&quot;is_triplet\&quot;:0,\&quot;measures\&quot;:[1,202,1,20     {
        "@type": "Comment",
        "comment": "Great tab! Although RangerDan88 is right though about the chords after the &quot;you know I believe in how&quot; part. It doesn&#039;t sound right just playing the D6 with the riff.\r\n\r\nAnd to answer bonjgday and digoutyerarse...\r\n\r\nAmM7 is played (x02110)\r\n\r\nA/E, as far as I know, is (002220). An &#039;A&#039; chord with an E on the bass.\r\n\r\nThere are minor-major chords because the chord is a minor, but the major-7th note (in this case Ab/G#) is being played instead of a minor-7th (G). If the chord were Am7 it would be (x02010), but the major-7th makes it (x02110). Likewise, If it were just AM7 it would be (x02120), and the chord would be major instead of minor, which would not match the song.\r\n\r\nAs far as I know, it doesn&#039;t work the other way around though. Take A7, for example (x02020). It&#039;s actually the major chord with a minor-7th, which would be AMm7 when written, but it doesn&#039;t make sense to write it like that for two reasons. 1) We don&#039;t need to specify when a chord is major with an upper-case &quot;M&quot;, we simply just write the letter; and 2) If we specified you were playing a minor-7th chord and left it as Am7, then we&#039;d think it was (x02010). So we avoid all that by making Mm7th chords as regular 7th&#039;s.\r\n\r\nFor reference:\r\n\r\nA     (x02220)\r\nA7    (x02020)\r\nAM7   (x02120)\r\nAm    (x02210)\r\nAm7   (x02010)\r\nAmM7  (x02110)",
